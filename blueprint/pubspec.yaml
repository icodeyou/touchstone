name: touchstone
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.1.0+2

environment:
  sdk: ^3.10.1

dependencies:
  dart_mappable: ^4.3.0
  flutter:
    sdk: flutter
  flutter_color_logger: ^1.1.0
  flutter_native_splash: ^2.4.8
  flutter_riverpod: ^3.0.3
  flutter_udid: ^4.1.6
  freezed_annotation: ^3.0.0
  go_router: ^14.0.0
  http: ^1.2.0
  json_annotation: ^4.9.0
  logger: ^2.4.0
  package_info_plus: ^10.2.0
  sentry_flutter: ^9.24.0
  shared_preferences: ^2.5.3
  slang: ">=4.0.0 <4.11.0" # error in version 4.11.0
  slang_flutter: ">=4.0.0 <4.11.0" # error in version 4.11.0
  snowflake_flutter_theme:
    git:
      url: https://github.com/icodeyou/snowflake_flutter_theme
      ref: 2.0.0
  uuid: ^4.5.2

dev_dependencies:
  build_runner: ^2.4.8
  dart_mappable_builder: ^4.3.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.7.1
  slang_build_runner: ">=4.0.0 <4.11.0" # error in version 4.11.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
